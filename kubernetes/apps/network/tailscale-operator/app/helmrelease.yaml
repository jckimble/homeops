---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      sourceRef:
        kind: HelmRepository
        name: tailscale
      version: 1.98.4
  values:
    operatorConfig:
      defaultTags:
        - tag:k8s-operator
    proxyConfig:
      defaultTags: tag:k8s-operator
    oauth:
      clientId: ${SECRET_TAILSCALE_OAUTH_CLIENT_ID}
      clientSecret: ${SECRET_TAILSCALE_OAUTH_CLIENT_SECRET}
