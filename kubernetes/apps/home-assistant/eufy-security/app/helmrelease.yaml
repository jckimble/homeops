---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eufy-security
spec:
  chartRef:
    kind: OCIRepository
    name: eufy-security
  interval: 1h
  values:
    controllers:
      eufy-security:
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/bropat/eufy-security-ws
              tag: 2.1.0
            env:
              TZ: America/Chicago
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 6
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: eufy-security
        ports:
          http:
            port: 3000
